<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>جدول الكورسات</title>
</head>
<body>
    <header>
        <div>Course Organizer</div>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="add-course.html">إضافة كورس</a>
        </nav>
    </header>
    <div class="container">
        <h2>الكورسات المسجلة</h2>
        <table>
            <thead>
                <tr>
                    <th>الكورس</th>
                    <th>الساعات</th>
                    <th>المحاضر</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <br>
        <button onclick="localStorage.clear(); location.reload();" style="background:#c0392b">مسح كل البيانات</button>
    </div>

    <script>
        window.onload = function() {
            const tableBody = document.getElementById('tableBody');
            const data = JSON.parse(localStorage.getItem('coursesData') || '[]');
            
            if(data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3">لا توجد كورسات.. ضيف كورس الأول</td></tr>';
            } else {
                data.forEach(item => {
                    tableBody.innerHTML += <tr><td>${item.name}</td><td>${item.hours}</td><td>${item.inst}</td></tr>;
                });
            }
        };
    </script>
</body>
</html>
