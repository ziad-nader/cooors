<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جدول الكورسات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">course<span>organizer</span></div>
    </header>

    <main>
        <h2>كورساتي</h2>
        <table border="1" style="width:100%; text-align:center;">
            <thead>
                <tr>
                    <th>الكورس</th>
                    <th>الساعات</th>
                    <th>المحاضر</th>
                    <th>ملاحظات</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </main>

    <script>
        window.onload = function() {
            const body = document.getElementById('tableBody');
            let courses = [];
            
            try {
                courses = JSON.parse(localStorage.getItem('myCourses')) || [];
            } catch(e) {
                courses = [];
            }

            if(courses.length === 0) {
                body.innerHTML = '<tr><td colspan="4">لا توجد بيانات</td></tr>';
            } else {
                let rows = '';
                courses.forEach(function(item) {
                    rows += '<tr>' +
                        '<td>' + item.name + '</td>' +
                        '<td>' + item.hours + '</td>' +
                        '<td>' + (item.instructor || '-') + '</td>' +
                        '<td>' + (item.notes || '-') + '</td>' +
                    '</tr>';
                });
                body.innerHTML = rows;
            }
        };
    </script>
</body>
</html>
