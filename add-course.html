<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>إضافة كورس</title>
</head>
<body>
    <header>
        <div>Course Organizer</div>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="courses.html">جدول الكورسات</a>
        </nav>
    </header>
    <div class="container">
        <h2>أضف كورس جديد</h2>
        <input type="text" id="name" placeholder="اسم الكورس">
        <input type="number" id="hours" placeholder="عدد الساعات">
        <input type="text" id="instructor" placeholder="اسم المحاضر">
        <button onclick="saveCourse()">حفظ الكورس ✅</button>
    </div>

    <script>
        function saveCourse() {
            const name = document.getElementById('name').value;
            const hours = document.getElementById('hours').value;
            const inst = document.getElementById('instructor').value;

            if(!name || !hours) { alert("املى البيانات يا زياد!"); return; }

            let list = JSON.parse(localStorage.getItem('coursesData') || '[]');
            list.push({ name, hours, inst });
            localStorage.setItem('coursesData', JSON.stringify(list));

            alert("تم الحفظ بنجاح! هوديك للجدول دلوقتي.");
            window.location.href = 'courses.html';
        }
    </script>
</body>
</html>
</html>
